<!DOCTYPE html>
<html>
<head>
    <title>Lecturer Dashboard Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-7xl mx-auto p-6">
        <h1 class="text-2xl font-bold mb-6">Lecturer Dashboard Test</h1>
        
        <div class="bg-white rounded-lg shadow p-4 mb-4">
            <h2 class="text-lg font-semibold mb-2">User Info</h2>
            <p>Name: Lecturer</p>
            <p>Lecturer ID: 1</p>
            <p>Institution ID: 4</p>
        </div>
        
        <div class="bg-white rounded-lg shadow p-4 mb-4">
            <h2 class="text-lg font-semibold mb-2">Quick Stats</h2>
            <div class="grid grid-cols-4 gap-4">
                <div class="text-center">
                    <div class="text-2xl font-bold">2</div>
                    <div class="text-sm text-gray-600">Classes</div>
                </div>
                <div class="text-center">
                    <div class="text-2xl font-bold">1</div>
                    <div class="text-sm text-gray-600">Rooms</div>
                </div>
                <div class="text-center">
                    <div class="text-2xl font-bold">0</div>
                    <div class="text-sm text-gray-600">Labs</div>
                </div>
                <div class="text-center">
                    <div class="text-2xl font-bold">Mon 7-10</div>
                    <div class="text-sm text-gray-600">Next Class</div>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow p-4 mb-4">
            <h2 class="text-lg font-semibold mb-2">Today's Schedule</h2>
            <div class="space-y-2">
                <div class="border rounded p-3">
                    <div class="font-medium">SIT 404 - Client Server Systems</div>
                    <div class="text-sm text-gray-600">7:00-10:00 • TB1_GF1</div>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow p-4">
            <h2 class="text-lg font-semibold mb-2">JavaScript Test</h2>
            <div id="test-time">Loading...</div>
            <button onclick="testAlert()" class="bg-blue-500 text-white px-4 py-2 rounded mt-2">Test JS</button>
        </div>
    </div>
    
    <script>
        // Test basic JavaScript
        function updateTime() {
            document.getElementById("test-time").textContent = new Date().toLocaleTimeString();
        }
        
        function testAlert() {
            alert("JavaScript is working!");
        }
        
        updateTime();
        setInterval(updateTime, 1000);
        
        console.log("Dashboard test loaded successfully");
    </script>
</body>
</html>
